<!-- Overrides jekyll-theme-primer's default layout (fetched verbatim from
     pages-themes/primer) with ONE change: the text site-title banner is
     replaced by the brand logo, linking home and shown on every page. The
     <head>, primer CSS, SEO, footer, and anchor scripts are unchanged. -->
<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
  </head>
  <body>
    <div class="container-lg px-3 my-5 markdown-body">
      <header class="mb-4">
        <a href="{{ "/" | absolute_url }}" aria-label="Fashionably Late — home">
          <img src="{{ "/assets/logo.svg" | relative_url }}" alt="Fashionably Late" style="height:56px;width:auto;border:0;">
        </a>
      </header>

      {{ content }}

      {% if site.github.private != true and site.github.license %}
      <div class="footer border-top border-gray-light mt-5 pt-3 text-right text-gray">
        This site is open source. {% github_edit_link "Improve this page" %}.
      </div>
      {% endif %}
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/4.1.0/anchor.min.js" integrity="sha256-lZaRhKri35AyJSypXXs4o6OPFTbTmUoltBbDCbdzegg=" crossorigin="anonymous"></script>
    <script>anchors.add();</script>
  </body>
</html>
